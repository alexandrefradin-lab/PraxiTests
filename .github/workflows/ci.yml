name: CI – Tests & Qualité

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  tests:
    name: PHP ${{ matrix.php }} – Tests Pest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── PHP ───────────────────────────────────────────────────────────────────
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, openssl, fileinfo, json, tokenizer, xml, ctype, curl, bcmath, intl
          coverage: xdebug
          tools: composer:v2

      # ── Cache Composer ────────────────────────────────────────────────────────
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      # ── Dépendances ───────────────────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # ── .env de test ──────────────────────────────────────────────────────────
      - name: Prepare .env.testing
        run: |
          cp .env.example .env.testing
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env.testing
          echo "APP_ENV=testing" >> .env.testing
          echo "DB_CONNECTION=sqlite" >> .env.testing
          echo "DB_DATABASE=:memory:" >> .env.testing
          echo "CACHE_STORE=array" >> .env.testing
          echo "MAIL_MAILER=array" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing
          echo "SESSION_DRIVER=array" >> .env.testing
          echo "AI_DEFAULT_DRIVER=null" >> .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      # ── Tests Pest ────────────────────────────────────────────────────────────
      - name: Run Pest tests with coverage
        run: |
          vendor/bin/pest \
            --coverage \
            --coverage-clover=coverage.xml \
            --min=40
        env:
          APP_ENV: testing

      # ── Upload coverage à Codecov (optionnel) ─────────────────────────────────
      - name: Upload coverage to Codecov
        if: matrix.php == '8.2'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: PHP Lint & Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # ── Syntaxe PHP ───────────────────────────────────────────────────────────
      - name: Check PHP syntax
        run: |
          find app plugins -name "*.php" -print0 \
            | xargs -0 -P4 php -l 2>&1 \
            | grep -v "No syntax errors" \
            | grep -v "^$" \
            && exit 1 || exit 0

      # ── PHPStan (static analysis) ─────────────────────────────────────────────
      - name: PHPStan (si installé)
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --memory-limit=256M --no-progress
          else
            echo "PHPStan non installé, vérification ignorée."
          fi
        continue-on-error: true

  security:
    name: Audit de sécurité des dépendances
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Composer audit (vulnérabilités connues)
        run: composer audit --no-dev
        continue-on-error: true

      - name: Local-php-security-checker
        uses: symfonycorp/security-checker-action@v5
        continue-on-error: true
