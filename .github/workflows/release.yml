name: Build PraxiQuest Release Zip

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:    # Permet de lancer manuellement depuis l'interface GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build distribuable

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, openssl, fileinfo, json, tokenizer, xml, ctype, curl, bcmath
          tools: composer:v2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.json') }}

      - name: Cache Node dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package.json') }}

      - name: composer install (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: npm install + build
        run: |
          npm install
          npm run build

      - name: Create dist directory
        run: |
          mkdir -p dist
          cp -R app bootstrap config database public resources routes storage vendor plugins docs dist/
          cp artisan composer.json package.json .env.example README.md INSTALL.md DEPLOY.md DEPLOY-OVH.md QUICKSTART.md dist/ 2>/dev/null || true
          [ -f composer.lock ] && cp composer.lock dist/ || true
          rm -f dist/.env dist/storage/app/.installed
          # Ensure storage subdirs preserved with .gitignore
          find dist/storage -name '.gitkeep' -delete 2>/dev/null || true

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(date +%Y%m%d-%H%M)-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          cd dist
          zip -qr "../praxiquest-${{ steps.version.outputs.version }}.zip" .
          cd ..
          ls -lh praxiquest-*.zip

      - name: Upload zip artifact (téléchargeable depuis GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: praxiquest-${{ steps.version.outputs.version }}
          path: praxiquest-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release (si tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: praxiquest-${{ steps.version.outputs.version }}.zip
          name: PraxiQuest ${{ steps.version.outputs.version }}
          body: |
            ## Distribution prête pour OVH

            Téléchargez `praxiquest-${{ steps.version.outputs.version }}.zip` ci-dessous, uploadez sur votre hébergement, puis ouvrez `/install.php`.

            Voir [DEPLOY-OVH.md](DEPLOY-OVH.md) pour le guide complet.
          draft: false
          prerelease: false
